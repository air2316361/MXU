name: build

on:
  workflow_dispatch: 

env:
  APP_VERSION: "2.3.0"

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.APP_VERSION }}
      tag: ${{ env.APP_VERSION }}
      is-release: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Echo version info
        run: |
          echo "Building version: ${{ env.APP_VERSION }}"

  windows:
    needs: meta
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "windows-x86_64"
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install

      - name: Update version
        shell: bash
        run: |
          VERSION="${{ env.APP_VERSION }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Updated version to $VERSION"

      - name: Build Tauri app
        run: pnpm tauri build --no-bundle --target x86_64-pc-windows-msvc

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p install
          TARGET_DIR="src-tauri/target/x86_64-pc-windows-msvc/release"
          cp -r "$TARGET_DIR/mxu.exe" install/ || true
          cp -r "$TARGET_DIR/mxu.pdb" install/ || true
          cp LICENSE README.md install/ || true
          ls -la install/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: MXU-win-x86_64-${{ env.APP_VERSION }}
          path: install
